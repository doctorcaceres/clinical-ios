name: ClinicalApp
options:
  bundleIdPrefix: com.doctorcaceres
  deploymentTarget:
    iOS: "16.0"
targets:
  ClinicalApp:
    type: application
    platform: iOS
    sources:
      - path: ClinicalApp
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.doctorcaceres.clinical
      CODE_SIGN_STYLE: Automatic
      GENERATE_INFOPLIST_FILE: YES
      TARGETED_DEVICE_FAMILY: "1,2"
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: "1"
      SWIFT_VERSION: "5.9"
      INFOPLIST_KEY_NSMicrophoneUsageDescription: "Clinical needs microphone access to record patient encounters"
      INFOPLIST_KEY_UIBackgroundModes: "audio"
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      INFOPLIST_KEY_CFBundleDisplayName: "Clinical"
